name: Hostinger

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. On récupère vos fichiers de CV
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. On installe Hugo
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      # 3. ÉTAPE CORRIGÉE : On installe Node.js et les styles (Bootstrap, etc.)
      - name: Installer Node.js et les outils de style
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Télécharger Bootstrap et les dépendances du thème
        run: |
          hugo mod npm pack
          npm install

      # 4. On fabrique le site final
      - run: hugo --gc --minify

      # 5. On crée le fichier ZIP pour Hostinger
      - uses: actions/upload-artifact@v4
        with:
          name: site-final-hostinger
          path: public/
